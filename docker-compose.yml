# Docker Compose configuration for Star Wars Engineer Assessment
# Run: docker compose up --build
# Backend API: http://localhost:8080
# Frontend (Expo): cd frontend && npx expo start (runs on host, not Docker)

services:
  # ===========================================
  # Backend Services
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_NAME: "${APP_NAME:-Star Wars API}"
      APP_ENV: "${APP_ENV:-local}"
      APP_KEY: "${APP_KEY:-base64:YOUR_APP_KEY_HERE}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      LOG_LEVEL: "${LOG_LEVEL:-debug}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-starwars}"
      DB_USERNAME: "${DB_USERNAME:-starwars}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      CACHE_STORE: "${CACHE_STORE:-redis}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"
      SESSION_DRIVER: "${SESSION_DRIVER:-redis}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-null}"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Queue worker for background jobs
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      APP_NAME: "${APP_NAME:-Star Wars API}"
      APP_ENV: "${APP_ENV:-local}"
      APP_KEY: "${APP_KEY:-base64:YOUR_APP_KEY_HERE}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-starwars}"
      DB_USERNAME: "${DB_USERNAME:-starwars}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      CACHE_STORE: "${CACHE_STORE:-redis}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - backend
      - mysql
      - redis
    networks:
      - app-network
    restart: unless-stopped

  # Scheduler for cron jobs (runs every minute to check schedule)
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    environment:
      APP_NAME: "${APP_NAME:-Star Wars API}"
      APP_ENV: "${APP_ENV:-local}"
      APP_KEY: "${APP_KEY:-base64:YOUR_APP_KEY_HERE}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-starwars}"
      DB_USERNAME: "${DB_USERNAME:-starwars}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      CACHE_STORE: "${CACHE_STORE:-redis}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - backend
      - mysql
      - redis
    networks:
      - app-network
    restart: unless-stopped

  # ===========================================
  # Database Services
  # ===========================================
  mysql:
    image: mysql:8.4
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${DB_DATABASE:-starwars}"
      MYSQL_USER: "${DB_USERNAME:-starwars}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    command: --mysql-native-password=ON --authentication-policy=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===========================================
  # Cache & Queue Services
  # ===========================================
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ===========================================
# Networks
# ===========================================
networks:
  app-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_vendor:
    driver: local
